<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI & BigTech News Tracker</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --navy: #0C1B2A;
      --navy-light: #142840;
      --navy-mid: #1A3352;
      --red: #E63946;
      --red-dark: #C5303C;
      --cream: #F8F6F2;
      --cream-dark: #EDE9E3;
      --white: #FFFFFF;
      --text-dark: #1A1A2E;
      --text-body: #3D3D56;
      --text-muted: #7A7A8E;
      --border-light: #E2DED8;
      --radius: 8px;
      --shadow-sm: 0 1px 3px rgba(12, 27, 42, 0.06);
      --shadow-md: 0 4px 16px rgba(12, 27, 42, 0.08);
      --shadow-lg: 0 8px 32px rgba(12, 27, 42, 0.12);

      --tint-ft: rgba(252, 217, 182, 0.4);
      --tint-nyt: rgba(200, 200, 210, 0.25);
      --tint-techcrunch: rgba(10, 143, 8, 0.2);
      --tint-verge: rgba(232, 76, 61, 0.2);
      --tint-ars: rgba(255, 102, 0, 0.2);
      --tint-venturebeat: rgba(44, 104, 201, 0.2);
      --tint-reuters: rgba(255, 128, 0, 0.2);
      --tint-mit: rgba(1, 27, 60, 0.3);
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--text-body);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      background: var(--navy);
      color: var(--white);
      padding: 3rem 2rem 2.5rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--red);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.6rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--white);
    }

    .header-subtitle {
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.6rem;
      max-width: 500px;
    }

    .header-accent {
      width: 48px;
      height: 3px;
      background: var(--red);
      margin-top: 1.5rem;
      border-radius: 2px;
    }

    /* ── Filters ──────────────────────────────────── */
    .filters {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
    }

    .filters-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .filter-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .days-input {
      width: 52px;
      background: var(--white);
      color: var(--navy);
      border: 1px solid var(--border-light);
      padding: 0.4rem 0.5rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
      text-align: center;
      -moz-appearance: textfield;
    }

    .days-input::-webkit-outer-spin-button,
    .days-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .days-input:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(12, 27, 42, 0.08);
    }

    .days-suffix {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .filter-select {
      background: var(--white);
      color: var(--text-body);
      border: 1px solid var(--border-light);
      padding: 0.45rem 0.85rem;
      border-radius: var(--radius);
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      min-width: 220px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(12, 27, 42, 0.08);
    }

    /* ── Stats bar ────────────────────────────────── */
    .stats-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-count {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .stats-count strong {
      color: var(--navy);
      font-weight: 600;
    }

    /* ── Topic Summary Bar ─────────────────────────── */
    .summary-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 0.75rem;
    }

    .summary-section {
      margin-bottom: 0.5rem;
    }

    .summary-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    .summary-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .summary-tag {
      background: var(--white);
      color: var(--text-body);
      border: 1px solid var(--border-light);
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .summary-tag:hover {
      background: var(--cream-dark);
      border-color: var(--navy-mid);
      color: var(--navy);
    }

    .summary-tag.active {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
    }

    .summary-tag .count {
      font-weight: 700;
      margin-left: 0.2rem;
      opacity: 0.7;
    }

    .summary-divider {
      height: 1px;
      background: var(--border-light);
      margin: 0.5rem 0;
    }

    /* ── Grid ─────────────────────────────────────── */
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 2rem 4rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: var(--white);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-sm);
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: #ccc;
    }

    .card-image {
      position: relative;
      width: 100%;
      height: 210px;
      overflow: hidden;
      background: var(--navy);
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-image img {
      transform: scale(1.04);
    }

    .card-image .tint-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      mix-blend-mode: multiply;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .card:hover .tint-overlay {
      opacity: 0.15;
    }

    .card-image.generated {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-image.generated .gen-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    .card-image.generated .gen-logo {
      position: relative;
      z-index: 2;
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .card-image.generated .gen-keyword {
      position: absolute;
      bottom: 14px;
      right: 16px;
      font-size: 0.65rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      z-index: 2;
    }

    .source-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      font-size: 0.68rem;
      font-weight: 700;
      z-index: 3;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .card-body {
      padding: 1.1rem 1.25rem 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.6rem;
    }

    .tag {
      background: rgba(230, 57, 70, 0.08);
      color: var(--red);
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .card-headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.35;
      color: var(--text-dark);
      margin-bottom: 0.7rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card:hover .card-headline {
      color: var(--navy);
    }

    .card-meta {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding-top: 0.6rem;
      border-top: 1px solid var(--cream-dark);
    }

    .card-meta-source {
      font-weight: 600;
      color: var(--text-body);
    }

    /* ── Loading & Empty ──────────────────────────── */
    .loading, .empty {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer ───────────────────────────────────── */
    footer {
      background: var(--navy);
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.02em;
    }

    footer strong {
      color: rgba(255, 255, 255, 0.7);
    }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 768px) {
      header { padding: 2rem 1.25rem 1.75rem; }
      h1 { font-size: 1.8rem; }
      .filters-inner { padding: 0.75rem 1.25rem; }
      .grid {
        padding: 0.75rem 1.25rem 3rem;
        grid-template-columns: 1fr;
      }
      .filter-group { width: 100%; }
      .filter-select { width: 100%; }
    }

    @media (min-width: 1200px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>

    // Track used images to avoid repeats within same render
    let usedImages = {};

    function pickImageForHeadline(headline) {
      const h = hashString(headline);
      for (const rule of IMAGE_RULES) {
        if (rule.pattern.test(headline)) {
          const key = rule.pattern.source;
          if (!usedImages[key]) usedImages[key] = new Set();
          // Try hash-based pick first, then rotate if already used
          let idx = h % rule.images.length;
          let attempts = 0;
          while (usedImages[key].has(idx) && attempts < rule.images.length) {
            idx = (idx + 1) % rule.images.length;
            attempts++;
          }
          usedImages[key].add(idx);
          // Reset tracker if all used
          if (usedImages[key].size >= rule.images.length) usedImages[key] = new Set();
          return rule.images[idx];
        }
      }
      return GENERAL_IMAGES[h % GENERAL_IMAGES.length];
    }

    const SOURCE_TINTS = {
      'FT':             'rgba(255, 200, 150, 0.35)',

    // ── Date Parsing (handles dd/MM/yyyy and other formats) ──
    function parseDate(str) {
      if (!str) return new Date(NaN);
      // Try dd/MM/yyyy format first
      const parts = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (parts) {
        return new Date(parseInt(parts[3]), parseInt(parts[2]) - 1, parseInt(parts[1]));
      }
      // Fallback to standard parsing
      return new Date(str);
    }

    // ── CSV Parsing ────────────────────────────────
    function parseCSV(text) {
      const lines = text.split('\n');
      if (lines.length < 2) return [];
      const articles = [];
      for (let i = 1; i < lines.length; i++) {
        const row = parseCSVLine(lines[i]);
        if (row.length < 6) continue;
        articles.push({
          date: parseDate(row[0]),
          headline: row[1],
          link: row[2],
          source: row[3],
          author: row[4] || '',
          imageUrl: row[5],
          companies: row[6] || '',
          topics: row[7] || '',
          tags: row[8] || ''
        });
      }
      return articles.filter(a => a.headline && !isNaN(a.date.getTime()));
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
          else inQuotes = !inQuotes;
        } else if (ch === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      result.push(current.trim());
      return result;
    }

    // ── Utilities ──────────────────────────────────
    function hashString(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function generateGradient(str) {
      const h = hashString(str);
      const hue1 = h % 360;
      const hue2 = (hue1 + 35 + (h % 50)) % 360;
      const angle = (h % 4) * 45 + 135;
      return `linear-gradient(${angle}deg, hsl(${hue1}, 35%, 18%) 0%, hsl(${hue2}, 40%, 12%) 100%)`;
    }

    function timeAgo(date) {
      const diff = Date.now() - date;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 60) return mins + 'm ago';
      if (hours < 24) return hours + 'h ago';
      if (days === 1) return 'Yesterday';
      if (days < 7) return days + 'd ago';
      return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    // ── Card Rendering ─────────────────────────────
    function createCard(article) {
      const badge = SOURCE_BADGE[article.source] || { bg: '#333', color: '#fff' };
      const tint = SOURCE_TINTS[article.source] || 'rgba(12, 27, 42, 0.2)';
      const tags = article.tags ? article.tags.split(',').map(t => t.trim()).filter(Boolean).slice(0, 3) : [];
      const tagsHtml = tags.map(t => `<span class="tag">${t}</span>`).join('');
      const escapedHeadline = article.headline.replace(/'/g, "\\'").replace(/"/g, '&quot;');

      let imageHtml;
      if (article.imageUrl) {
        const fallbackImg = pickImageForHeadline(article.headline);
        imageHtml = `
          <div class="card-image">
            <img src="${article.imageUrl}" alt="" loading="lazy"
                 onerror="this.onerror=null;this.src='${fallbackImg}'">
            <div class="tint-overlay" style="background: ${tint}"></div>
            <span class="source-badge" style="background:${badge.bg};color:${badge.color}">${article.source}</span>
          </div>`;
      } else {
        imageHtml = generateFallbackHtml(article.headline, article.source);
      }

      // Ensure link is valid
      const href = article.link && article.link !== '#' ? article.link : '#';

      return `
        <a class="card" href="${href}" target="_blank" rel="noopener noreferrer">
          ${imageHtml}
          <div class="card-body">
            <div class="card-tags">${tagsHtml}</div>
            <h2 class="card-headline">${article.headline}</h2>
            <div class="card-meta">
              <span class="card-meta-source">${article.source}</span>
              <span>${timeAgo(article.date)}</span>
            </div>
          </div>
        </a>`;
    }

    function generateFallbackHtml(headline, source) {
      const badge = SOURCE_BADGE[source] || { bg: '#333', color: '#fff' };
      const tint = SOURCE_TINTS[source] || 'rgba(12, 27, 42, 0.2)';
      const imgUrl = pickImageForHeadline(headline);
      return `
        <div class="card-image">
          <img src="${imgUrl}" alt="" loading="lazy">
          <div class="tint-overlay" style="background: ${tint}"></div>
          <span class="source-badge" style="background:${badge.bg};color:${badge.color}">${source}</span>
        </div>`;
    }

    // ── Build Topic Summary ─────────────────────
    function buildSummary(articles) {
      const companyCounts = {};
      const topicCounts = {};

      articles.forEach(a => {
        if (a.companies) {
          a.companies.split(',').map(c => c.trim()).filter(Boolean).forEach(c => {
            companyCounts[c] = (companyCounts[c] || 0) + 1;
          });
        }
        if (a.topics) {
          a.topics.split(',').map(t => t.trim()).filter(Boolean).forEach(t => {
            topicCounts[t] = (topicCounts[t] || 0) + 1;
          });
        }
      });

      const sortByCount = obj => Object.entries(obj).sort((a, b) => b[1] - a[1]);
      return {
        companies: sortByCount(companyCounts),
        topics: sortByCount(topicCounts)
      };
    }

    function renderSummary(summary) {
      const bar = document.getElementById('summaryBar');

      if (summary.companies.length === 0 && summary.topics.length === 0) {
        bar.innerHTML = '';
        return;
      }

      const renderTags = (items, type) => items.map(([name, count]) =>
        `<button class="summary-tag${currentFilter === name ? ' active' : ''}" data-keyword="${name}" data-type="${type}">${name}<span class="count">${count}</span></button>`
      ).join('');

      let html = '';

      if (summary.companies.length > 0) {
        html += `<div class="summary-section">
          <div class="summary-label">Companies in results</div>
          <div class="summary-tags">${renderTags(summary.companies, 'company')}</div>
        </div>`;
      }

      if (summary.topics.length > 0) {
        if (summary.companies.length > 0) html += '<div class="summary-divider"></div>';
        html += `<div class="summary-section">
          <div class="summary-label">Topics in results</div>
          <div class="summary-tags">${renderTags(summary.topics, 'topic')}</div>
        </div>`;
      }

      bar.innerHTML = html;
    }

    // ── Filter & Render ──────────────────────────
    function filterAndRender() {
      usedImages = {}; // Reset image tracker for fresh render
      // Date filter
      let filtered;
      if (currentDays === null) {
        filtered = allArticles.slice(); // all
      } else {
        const cutoff = new Date(Date.now() - currentDays * 86400000);
        filtered = allArticles.filter(a => a.date >= cutoff);
      }

      // Build summary from date-filtered results (before keyword filter)
      const summary = buildSummary(filtered);

      // Apply keyword/topic filter (from dropdown or summary tag click)
      if (currentFilter !== 'all') {
        const kw = currentFilter.toLowerCase();
        filtered = filtered.filter(a => (a.tags || '').toLowerCase().includes(kw));
      }

      // Sort newest first
      filtered.sort((a, b) => b.date - a.date);

      // Stats
      const daysLabel = currentDays === null ? 'all time' : `last ${currentDays} day${currentDays > 1 ? 's' : ''}`;
      document.getElementById('statsCount').innerHTML =
        `<strong>${filtered.length}</strong> article${filtered.length !== 1 ? 's' : ''}` +
        (currentFilter !== 'all' ? ` matching "<strong>${currentFilter}</strong>"` : '') +
        ` &mdash; ${daysLabel}` +
        (currentFilter !== 'all' ? ` &nbsp;<button id="clearFilter" style="background:none;border:1px solid var(--border-light);padding:0.2rem 0.5rem;border-radius:12px;font-size:0.72rem;cursor:pointer;color:var(--text-muted);font-family:inherit;">Clear filter</button>` : '');

      // Render summary tags
      renderSummary(summary);

      // Render cards
      const grid = document.getElementById('newsGrid');
      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">No articles found for this filter combination.</div>';
        return;
      }
      grid.innerHTML = filtered.map(createCard).join('');

      // Clear filter button
      const clearBtn = document.getElementById('clearFilter');
      if (clearBtn) {
        clearBtn.addEventListener('click', function() {
          currentFilter = 'all';
          document.getElementById('filterSelect').value = 'all';
          filterAndRender();
        });
      }
    }

    // ── Event Listeners ──────────────────────────

    // Days input: accepts a number or "all"
    function applyDaysInput() {
      const val = document.getElementById('daysInput').value.trim().toLowerCase();
      if (val === 'all' || val === '') {
        currentDays = null;
        document.getElementById('daysInput').value = 'all';
      } else {
        const num = parseInt(val);
        if (num > 0) {
          currentDays = num;
        } else {
          return; // invalid, ignore
        }
      }
      filterAndRender();
    }

    document.getElementById('daysInput').addEventListener('change', applyDaysInput);
    document.getElementById('daysInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.target.blur();
        applyDaysInput();
      }
    });

    // Dropdown filter
    document.getElementById('filterSelect').addEventListener('change', function(e) {
      currentFilter = e.target.value;
      filterAndRender();
    });

    // Summary tag clicks (delegated) — sync with dropdown
    document.getElementById('summaryBar').addEventListener('click', function(e) {
      const tag = e.target.closest('.summary-tag');
      if (tag) {
        const keyword = tag.dataset.keyword;
        if (currentFilter === keyword) {
          currentFilter = 'all';
        } else {
          currentFilter = keyword;
        }
        // Sync dropdown
        const select = document.getElementById('filterSelect');
        select.value = currentFilter;
        // If value doesn't exist in dropdown, reset to 'all'
        if (select.value !== currentFilter) select.value = 'all';
        filterAndRender();
      }
    });

    // ── Load Data ────────────────────────────────
    async function loadData() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        allArticles = parseCSV(await response.text());
        allArticles.sort((a, b) => b.date - a.date);
        filterAndRender();
      } catch (e) {
        document.getElementById('newsGrid').innerHTML = `
          <div class="empty">
            <p>Could not load news data.</p>
            <p style="margin-top:0.5rem;font-size:0.8rem;color:#7A7A8E;">
              Make sure the Google Sheet is published to the web.<br>
              Error: ${e.message}
            </p>
          </div>`;
      }
    }

    function loadDemo() {
      allArticles = [
        { date: new Date(), headline: 'NVIDIA unveils next-generation Blackwell Ultra chips for AI training workloads', link: 'https://www.nytimes.com/technology', source: 'NYT', author: '', imageUrl: '', tags: 'NVIDIA, Semiconductors', companies: 'NVIDIA', topics: 'Semiconductors' },
        { date: new Date(Date.now() - 86400000), headline: 'OpenAI raises $10B in latest funding round at record $300B valuation', link: 'https://www.ft.com/technology', source: 'FT', author: '', imageUrl: '', tags: 'OpenAI, AGI', companies: 'OpenAI', topics: 'AGI' },
        { date: new Date(Date.now() - 86400000), headline: 'European Union imposes sweeping new AI regulations targeting deepfakes', link: 'https://www.reuters.com/technology', source: 'Reuters', author: '', imageUrl: '', tags: 'AI Regulation, Deepfakes', companies: '', topics: 'AI Regulation, Deepfakes' },
        { date: new Date(Date.now() - 86400000*2), headline: 'TSMC expands Arizona fabrication plant with $20B additional investment', link: 'https://techcrunch.com', source: 'TechCrunch', author: '', imageUrl: '', tags: 'TSMC, Semiconductors', companies: 'TSMC', topics: 'Semiconductors' },
        { date: new Date(Date.now() - 86400000*2), headline: 'Microsoft deeply integrates Copilot across Windows and Office suite', link: 'https://www.theverge.com', source: 'The Verge', author: '', imageUrl: '', tags: 'Microsoft, Generative AI', companies: 'Microsoft', topics: 'Generative AI' },
        { date: new Date(Date.now() - 86400000*3), headline: 'Anthropic launches Claude with enhanced reasoning and analysis capabilities', link: 'https://www.technologyreview.com', source: 'MIT Tech Review', author: '', imageUrl: '', tags: 'Anthropic, LLM', companies: 'Anthropic', topics: 'LLM' },
        { date: new Date(Date.now() - 86400000*4), headline: 'Cloudflare reports unprecedented surge in AI bot traffic globally', link: 'https://arstechnica.com', source: 'Ars Technica', author: '', imageUrl: '', tags: 'Cloudflare, Data Centers', companies: 'Cloudflare', topics: 'Data Centers' },
        { date: new Date(Date.now() - 86400000*5), headline: 'Anduril wins $1B Pentagon contract for autonomous defense systems', link: 'https://www.reuters.com/technology', source: 'Reuters', author: '', imageUrl: '', tags: 'Anduril, AI Military', companies: 'Anduril', topics: 'AI Military' },
        { date: new Date(Date.now() - 86400000*5), headline: 'ASML warns of potential impact from expanded US export controls on China', link: 'https://www.ft.com/technology', source: 'FT', author: '', imageUrl: '', tags: 'ASML, Export Controls', companies: 'ASML', topics: 'Export Controls' },
        { date: new Date(Date.now() - 86400000*6), headline: 'Google DeepMind achieves breakthrough in protein structure prediction for drug discovery', link: 'https://www.nytimes.com/technology', source: 'NYT', author: '', imageUrl: '', tags: 'Google DeepMind, AI Healthcare', companies: 'Google DeepMind', topics: 'AI Healthcare' },
        { date: new Date(Date.now() - 86400000*6), headline: 'US Senate introduces bipartisan bill to regulate artificial intelligence in critical infrastructure', link: 'https://venturebeat.com', source: 'VentureBeat', author: '', imageUrl: '', tags: 'AI Regulation, Government Policy', companies: '', topics: 'AI Regulation, Government Policy' },
      ];
      filterAndRender();
    }

    // ── Init ─────────────────────────────────────
    if (SHEET_CSV_URL === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
      loadDemo();
    } else {
      loadData();
    }
  </script>
